# Render Blueprint - Portfolio Ingride
# https://render.com/docs/blueprint-spec

services:
  # ── Backend (Django API) ──────────────────────────────────
  - type: web
    name: portfolio-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: new-portfolio/backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.render
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set manually after frontend deploys
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: portfolio-redis
          type: redis
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: GITHUB_USERNAME
        value: ingridesouza
      - key: WEB_CONCURRENCY
        value: "2"

  # ── Celery Worker ─────────────────────────────────────────
  - type: worker
    name: portfolio-celery
    runtime: python
    region: oregon
    plan: free
    rootDir: new-portfolio/backend
    buildCommand: ./build.sh
    startCommand: celery -A config worker -l info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.render
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        fromService:
          name: portfolio-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: portfolio-redis
          type: redis
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_USERNAME
        value: ingridesouza

  # ── Celery Beat ───────────────────────────────────────────
  - type: worker
    name: portfolio-celery-beat
    runtime: python
    region: oregon
    plan: free
    rootDir: new-portfolio/backend
    buildCommand: ./build.sh
    startCommand: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.render
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        fromService:
          name: portfolio-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: portfolio-redis
          type: redis
          property: connectionString

  # ── Frontend (Static Site) ───────────────────────────────
  - type: web
    name: portfolio-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: new-portfolio/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to backend URL after deploy

  # ── Redis ─────────────────────────────────────────────────
  - type: redis
    name: portfolio-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Only internal access

# ── Database ──────────────────────────────────────────────
databases:
  - name: portfolio-db
    region: oregon
    plan: free
    databaseName: portfolio_db
    user: portfolio_user
    ipAllowList: []  # Only internal access
